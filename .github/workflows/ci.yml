name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality-gate:
    name: fmt · lint · loc · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      # Each gate mirrors a justfile recipe so CI and local runs stay identical.
      - name: Formatting (just fmt-check)
        run: just fmt-check

      - name: LOC ratchet (just loc-check)
        run: just loc-check

      - name: Development skill scripts (just test-dev-scripts)
        run: just test-dev-scripts

      - name: Setup site and canonical skill (just test-site)
        run: just test-site

      - name: Clippy (just lint)
        run: just lint

      # Unit tests only. Local relay-backed integration tests run through
      # `just test-local-relay`, `just test-local-nip29`, or aggregate
      # `just test` when nak/croissant are available. Ignored public-relay
      # probes stay behind explicit live-probe recipes.
      - name: Unit tests (just test-unit)
        run: just test-unit

  local-relay-integration:
    name: local relay integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Pin nak
        run: go install github.com/fiatjaf/nak@v0.20.0

      - name: Local relay integration tests (just test-local-relay)
        run: just test-local-relay
