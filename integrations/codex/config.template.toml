# Copy these hook entries into ~/.codex/config.toml, or into a trusted
# <repo>/.codex/config.toml. Replace __HOOK__ with the absolute path to
# integrations/codex/te-hook.py.

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'python3 "__HOOK__" session-start'
timeout = 30
statusMessage = "Starting tenex-edge"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'python3 "__HOOK__" user-prompt-submit'
timeout = 30
statusMessage = "tenex-edge turn start"

[[hooks.PostToolUse]]

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'python3 "__HOOK__" post-tool-use'
timeout = 10
statusMessage = "tenex-edge turn check"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "__HOOK__" stop'
timeout = 30
statusMessage = "tenex-edge turn end"
