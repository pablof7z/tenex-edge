# Copy these hook entries into ~/.codex/config.toml, or into a trusted
# <repo>/.codex/config.toml. mosaico must be on PATH (or set MOSAICO_BIN).

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'mosaico harness hook codex --type session-start'
timeout = 5
statusMessage = "Starting mosaico"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'mosaico harness hook codex --type user-prompt-submit'
timeout = 5
statusMessage = "mosaico turn start"

[[hooks.PostToolUse]]

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'mosaico harness hook codex --type post-tool-use'
timeout = 5
statusMessage = "mosaico turn check"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'mosaico harness hook codex --type stop'
timeout = 5
statusMessage = "mosaico turn end"
